<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM & File Manager - מוטי וועבער</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; text-align: right; }
        .dashboard { max-width: 1200px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 30px; }
        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; background: var(--accent); display: inline-flex; align-items: center; gap: 5px; font-size: 13px; margin: 2px; }
        .btn-green { background: var(--success); }
        .btn-red { background: var(--danger); }
        .btn-grey { background: #7f8c8d; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: right; }
        th { background: #f8f9fa; }
        .info-card { background: #fdfdfd; border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .info-card input { width: 200px; padding: 5px; margin-left: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .file-list { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .file-item { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 10px; border: 1px solid #eee; border-radius: 8px; }
        .folder-icon { color: #f1c40f; font-size: 18px; }
        .breadcrumb { margin-bottom: 15px; font-weight: bold; color: var(--accent); cursor: pointer; }
        #loader { display: none; text-align: center; padding: 10px; color: var(--accent); }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1 id="title">📂 CRM & פייל מענעדזשער</h1>
        <div id="topButtons">
            <button class="btn btn-green" onclick="createNewClient()">➕ נייע קליענט</button>
            <button class="btn btn-grey" onclick="resetToken()">🔑 טויש טאקען</button>
        </div>
    </div>

    <div class="content">
        <div id="loader">ארבעט אויף די אינפארמאציע...</div>
        
        <div id="mainView">
            <table>
                <thead>
                    <tr><th>קליענט נאמען</th><th>אימעיל</th><th>סטאטוס</th><th>אקציעס</th></tr>
                </thead>
                <tbody id="clientTableBody"></tbody>
            </table>
        </div>

        <div id="fileView" style="display:none">
            <div class="breadcrumb" onclick="location.reload()">🔙 צוריק צום הויפט עקראן</div>
            <div id="clientMetaArea" class="info-card"></div>
            
            <div style="background: #eef2f3; padding: 15px; border-radius: 10px;">
                <button class="btn btn-green" onclick="createNewFolder()">📁 נייע פאלדער</button>
                <button class="btn" onclick="document.getElementById('fileInput').click()">⬆️ אפלאוד פייל</button>
                <input type="file" id="fileInput" style="display:none" onchange="handleFileUpload()">
            </div>
            
            <div id="currentPathDisplay" style="margin-top:10px; font-size:12px; color:#666;"></div>
            <div class="file-list" id="fileItems"></div>
        </div>
    </div>
</div>

<script>
    const USER = 'moty-weber';
    const REPO = 'files';
    let TOKEN = localStorage.getItem('github_crm_token');
    let currentPath = "";
    let currentClient = "";

    async function checkAuth() {
        if (!TOKEN) {
            let input = prompt("לייג אריין דיין GitHub Token:");
            if (input) { localStorage.setItem('github_crm_token', input.trim()); location.reload(); }
        } else { loadClients(); }
    }

    async function loadClients() {
        toggleLoader(true);
        try {
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/Clients`, {
                headers: { 'Authorization': `Bearer ${TOKEN}` }
            });
            const data = await res.json();
            const body = document.getElementById('clientTableBody');

                        const meta = await getMeta(item.name);

                                <td><strong>${item.name}</strong></td>

                                <td>${meta.status === 'done' ? '✅' : '⏳'}</td>
