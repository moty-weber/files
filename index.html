<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מיין ביזנעס CRM - מוטי וועבער</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--light); margin: 0; padding: 20px; }
        .dashboard { max-width: 1100px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 30px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; background: var(--accent); text-decoration: none; }
        .btn-green { background: var(--success); }
        .search-bar { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: right; }
        .loader { display: none; color: var(--accent); font-weight: bold; padding: 10px; }
        #fileView { display: none; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="mainView">
        <div class="header">
            <h1>📂 CRM סיסטעם - מוטי וועבער</h1>
            <div>
                <button class="btn btn-green" onclick="createNewClient()">➕ נייע קליענט</button>
                <button class="btn" style="background:#e67e22" onclick="resetToken()">🔑 טויש טאקען</button>
            </div>
        </div>
        <div class="content">
            <input type="text" class="search-bar" id="searchInput" onkeyup="filterTable()" placeholder="זוך קליענט...">
            <div id="mainLoader" class="loader">לאדנט דאטא...</div>
            <table>
                <thead><tr><th>קליענט נאמען</th><th>אקציעס</th></tr></thead>
                <tbody id="clientTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="fileView">
        <div class="header" style="background:#34495e">
            <h1 id="currentFolderName">קליענט פיילס</h1>
            <button class="btn" onclick="location.reload()">⬅️ צוריק</button>
        </div>
        <div class="content">
            <button class="btn" onclick="document.getElementById('fileInput').click()">⬆️ אפלאוד פייל</button>
            <input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
            <div id="fileList" style="margin-top:20px"></div>
        </div>
    </div>
</div>

<script>
    const USER = 'moty-weber';
    const REPO = 'files';
    
    // נעמט דעם טאקען פונעם זכרון (Local Storage)
    let TOKEN = localStorage.getItem('github_crm_token');

    async function checkAuth() {
        if (!TOKEN) {
            TOKEN = prompt("ביטע פעיסט אריין דיין GitHub Token (נאר איין מאל):");
            if (TOKEN) {
                localStorage.setItem('github_crm_token', TOKEN.trim());
                location.reload();
            }
        } else {
            loadClients();
        }
    }

    async function loadClients() {
        const loader = document.getElementById('mainLoader');
        loader.style.display = "block";
        try {
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/Clients`, {
                headers: { 'Authorization': `Bearer ${TOKEN}` }
            });
            if (res.status === 401) {
                alert("דער טאקען איז נישט גוט. ביטע לייג אריין א פרישן.");
                resetToken();
                return;
            }
            const data = await res.json();
            const body = document.getElementById('clientTableBody');
            body.innerHTML = "";
            if (Array.isArray(data)) {
                data.forEach(item => {
                    if (item.type === 'dir') {
                        body.innerHTML += `<tr><td><strong>${item.name}</strong></td><td><button class="btn" onclick="openFolder('${item.path}', '${item.name}')">📁 עפן פיילס</button></td></tr>`;
                    }
                });
            }
        } catch (e) { console.error(e); }
        loader.style.display = "none";
    }

    function resetToken() {
        localStorage.removeItem('github_crm_token');
        location.reload();
    }

    // פונקציעס פאר פאלדערס און אפלאודס
    let currentPath = "";
    async function openFolder(path, name) {
        currentPath = path;
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('fileView').style.display = 'block';
        document.getElementById('currentFolderName').innerText = name;
        const list = document.getElementById('fileList');
        list.innerHTML = "לאדנט...";
        const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${path}`, {
            headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        const data = await res.json();
        list.innerHTML = "";
        data.forEach(f => {
            if(f.name !== ".keep") {
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;">📄 <a href="${f.html_url}" target="_blank">${f.name}</a></div>`;
            }
        });
    }

    async function createNewClient() {
        const name = prompt("נאמען פונעם נייעם קליענט:");
        if (!name) return;
        const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/Clients/${name}/.keep`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: `Add client ${name}`, content: "YmFzZTY0" })
        });
        if(res.ok) { alert("קליענט געעפנט!"); loadClients(); }
        else { alert("עראר ביים באשאפן קליענט."); }
    }

    function filterTable() {
        let val = document.getElementById('searchInput').value.toLowerCase();
        let rows = document.querySelectorAll('#clientTableBody tr');
        rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none");
    }

    window.onload = checkAuth;
</script>
</body>
</html>
